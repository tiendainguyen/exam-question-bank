spring:
  application:
    name: exam-question-bank

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/exambank}
    username: ${DB_USER:exambank}
    password: ${DB_PASSWORD:exambank}

  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Tolerate a pre-existing non-empty schema (e.g. pgvector objects on a
    # managed DB). baseline-version 0 keeps V1 in scope so it still runs —
    # the default (1) would skip V1 and never create app_user.
    baseline-on-migrate: true
    baseline-version: 0

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  ai:
    openai:
      # OpenAI-compatible endpoint. Default = Groq (free tier, no card).
      # Override AI_BASE_URL/AI_MODEL for OpenAI, Gemini, OpenRouter, etc.
      # Empty key by default so the app boots; AI_VISION extraction fails only
      # when invoked without a key. NOTE: AI_VISION needs a *vision-capable*
      # model (the default text model below cannot see images) — set AI_MODEL
      # to e.g. a Groq vision model / gpt-4o / a Claude vision model.
      api-key: ${AI_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.groq.com/openai/v1}
      chat:
        options:
          model: ${AI_MODEL:llama-3.3-70b-versatile}

  # Virtual threads OFF — ThreadLocal-based per-user context relies on
  # platform-thread scoping (see UserContext). Re-evaluate per task that
  # explicitly opts into StructuredTaskScope.
  threads:
    virtual:
      enabled: false

server:
  port: ${SERVER_PORT:8080}

app:
  storage:
    # Local filesystem dir for uploaded exam PDFs ({examId}.pdf).
    exam-dir: ${EXAM_STORAGE_DIR:./data/exams}
  ocr:
    # OCR for scanned PDFs (no text layer). render-dpi: higher = better OCR
    # accuracy but bigger images / more vision tokens. tessdata-path empty →
    # tess4j uses the TESSDATA_PREFIX env var. text-layer-min-chars: below this
    # many extracted chars, TESSERACT treats the PDF as a scan and OCRs it.
    render-dpi: ${OCR_RENDER_DPI:200}
    language: ${OCR_LANGUAGE:vie+eng}
    tessdata-path: ${TESSDATA_PATH:}
    text-layer-min-chars: ${OCR_TEXT_LAYER_MIN_CHARS:40}
  jwt:
    # Override in every non-dev environment via APP_JWT_SECRET (>= 32 bytes for HS256).
    secret: ${APP_JWT_SECRET:dev-only-insecure-secret-change-me-0123456789abcdef}
    access-token-ttl: ${APP_JWT_ACCESS_TTL:PT15M}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    # Step-by-step extraction trace (extract:start → read-pdf → ocr → split → done).
    # Drop to INFO to silence the per-step debug lines.
    com.exambank.exam: ${EXTRACT_LOG_LEVEL:DEBUG}